services:
  agent:
    build: .
    container_name: subscription_agent
    env_file:
      - .env
    stdin_open: true   # REPL требует интерактивного stdin
    tty: true
    restart: "no"
    # Можно переопределить команду для one-shot режима:
    #   docker compose run --rm agent "Сколько я потрачу в ближайшие 30 дней?"
    # По умолчанию запускается интерактивный REPL.
    command: []
