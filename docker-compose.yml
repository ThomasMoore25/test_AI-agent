services:
  agent:
    build: .
    container_name: subscription_agent
    env_file:
      - .env
    stdin_open: true   # REPL требует интерактивного stdin
    tty: true
    restart: "no"
    # One-shot режим:
    #   docker compose run --rm agent "Сколько я потрачу в ближайшие 30 дней?"
    # Интерактивный REPL:
    #   docker compose up
    # Лог трейса в volume:
    volumes:
      - ./logs:/app/logs
    environment:
      - TRACE_LOG_PATH=/app/logs/trace.jsonl
