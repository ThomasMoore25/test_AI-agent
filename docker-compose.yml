services:
  agent:
    build: .
    container_name: subscription_agent
    env_file:
      - .env
    stdin_open: true
    tty: true
    restart: "no"
    volumes:
      - ./logs:/app/logs
    environment:
      - TRACE_LOG_PATH=/app/logs/trace.jsonl
    profiles:
      - default

  # Опциональный сервис для запуска тестов в контейнере
  test:
    build: .
    container_name: subscription_agent_test
    env_file:
      - .env
    entrypoint: ["python", "-m", "pytest", "-v"]
    restart: "no"
    profiles:
      - test

  # Опциональный сервис для линтинга
  lint:
    build: .
    container_name: subscription_agent_lint
    entrypoint: ["python", "-m", "ruff", "check", "app/", "tests/", "main.py"]
    restart: "no"
    profiles:
      - lint
